services:
  app:
    image: localhost/aether-auth:latest
    env_file:
      - .env
    build:
      context: .
      dockerfile: Containerfile
    ports:
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"
    depends_on:
      - postgres
      - redis
      - mailpit
    environment:
      SERVER_PORT: ${SERVER_PORT:-8080}
      SERVER_ENV: ${SERVER_ENV:-development}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SSL_MODE: ${DB_SSL_MODE:-disable}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB:-0}
      QUEUE_REDIS_ADDR: redis:6379
      QUEUE_REDIS_PASSWORD: ${REDIS_PASSWORD}
      QUEUE_REDIS_DB: ${QUEUE_REDIS_DB:-1}
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
    volumes:
      - ./.env:/app/.env:Z,ro
    networks:
      - app-network
    restart: unless-stopped

  postgres:
    image: docker.io/library/postgres:17-alpine
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped

  redis:
    image: docker.io/library/redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    restart: unless-stopped

  mailpit:
    image: docker.io/axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
